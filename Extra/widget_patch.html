<!-- FarmAI Chatbot Premium Widget -->
{% if not hide_chat %}
<style>
/* Premium Widget CSS */
#chat-box.premium-widget {
    position: fixed;
    bottom: 120px;
    right: 30px;
    width: 400px;
    height: 600px;
    max-height: 70vh;
    background: rgba(25, 35, 30, 0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(168, 230, 207, 0.2);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    overflow: hidden;
    display: none;
    flex-direction: column;
    z-index: 1050;
    transform-origin: bottom right;
    animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.chatbot-header {
    background: linear-gradient(135deg, #122a1f 0%, #08120d 100%);
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.bot-avatar-bg {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(16, 185, 129, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #10b981;
}

.chatbot-title-text h2 {
    margin: 0;
    color: #a8e6cf;
    font-size: 1.1rem;
    font-weight: 700;
}

.chatbot-title-text p {
    margin: 2px 0 0 0;
    color: #8fa099;
    font-size: 0.75rem;
}

.close-chat-btn {
    background: transparent;
    border: none;
    color: #8fa099;
    cursor: pointer;
}

.close-chat-btn:hover { color: #fff; }

.chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.message { display: flex; gap: 12px; max-width: 90%; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.bot { align-self: flex-start; }

.message-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; flex-shrink: 0;
}
.message.bot .message-avatar { background: rgba(16, 185, 129, 0.15); color: #10b981; }
.message.user .message-avatar { background: #10b981; color: white; }

.bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; color: #e2e8f0;
}
.message.user .bubble { background: #10b981; color: white; border-top-right-radius: 4px; }
.message.bot .bubble { background: rgba(255, 255, 255, 0.05); border-top-left-radius: 4px; }

.suggestion-chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 10px 20px; }
.suggestion-chip {
    background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
    color: #a8e6cf; padding: 6px 12px; border-radius: 99px; font-size: 0.8rem; cursor: pointer;
}
.suggestion-chip:hover { background: rgba(16, 185, 129, 0.2); }

.input-area {
    padding: 12px 20px 20px 20px; display: flex; gap: 12px; border-top: 1px solid rgba(255,255,255,0.05);
}
.chat-input {
    flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 99px; padding: 10px 16px; color: #fff; outline: none;
}
.chat-input:focus { border-color: #10b981; }
.send-btn {
    background: #10b981; border: none; width: 40px; height: 40px; border-radius: 50%;
    color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
</style>

<div id="chat-toggle" onclick="togglePremiumChat()" class="magnetic" title="Chat with Krishi Mitr AI" style="position: fixed; bottom: 30px; right: 30px; display: block; background: transparent; box-shadow: none; width: 80px; height: 80px; padding: 0; cursor: pointer; transition: transform 0.3s ease; z-index: 1050;">
  <lottie-player src="{{ url_for('static', filename='uploads/Robo.json') }}" background="transparent" speed="1" style="width: 100%; height: 100%; filter: drop-shadow(0 10px 15px rgba(16,185,129,0.3));" loop autoplay></lottie-player>
</div>

<div id="chat-box" class="premium-widget">
    <div class="chatbot-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="bot-avatar-bg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                    <circle cx="15.5" cy="8.5" r="1.5" fill="currentColor"/>
                </svg>
            </div>
            <div class="chatbot-title-text">
                <h2>Krishi Mitr AI</h2>
                <p>Always online</p>
            </div>
        </div>
        <button class="close-chat-btn" onclick="togglePremiumChat()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="message bot">
            <div class="message-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                </svg>
            </div>
            <div class="bubble">Namaste! I'm Krishi Mitr AI, your expert agricultural assistant. How can I help you today?</div>
        </div>
    </div>
    
    <div class="suggestion-chips" id="suggestionChips">
        <div class="suggestion-chip" onclick="fillSuggestion('Soil guide')">Soil guide</div>
        <div class="suggestion-chip" onclick="fillSuggestion('NPK for tomatoes')">NPK for tomatoes</div>
    </div>
    <div class="input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask about crops..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>
{% endif %}

    </div> <!-- End Page Content Wrapper -->
<script>
    /* Premium Chatbot Logic */
    function togglePremiumChat() {
        const box = document.getElementById('chat-box');
        if (box.style.display === 'flex') {
            box.style.display = 'none';
        } else {
            box.style.display = 'flex';
            document.getElementById('chatInput').focus();
        }
    }
    
    let chatHistory = [];

    function scrollToBottom() {
        const chatWindow = document.getElementById('chatWindow');
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function fillSuggestion(text) {
        document.getElementById('chatInput').value = text;
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        input.value = '';
        document.getElementById('suggestionChips').style.display = 'none';
        
        document.getElementById('chatWindow').insertAdjacentHTML('beforeend', 
            <div class="message user">
                <div class="message-avatar">U</div>
                <div class="bubble"></div>
            </div>
        );
        scrollToBottom();
        
        const typingId = 'typing-' + Date.now();
        document.getElementById('chatWindow').insertAdjacentHTML('beforeend', 
            <div class="message bot" id="">
                <div class="message-avatar">
                   <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
                        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                    </svg>
                </div>
                <div class="bubble">...</div>
            </div>
        );
        scrollToBottom();
        
        try {
            const response = await fetch('/api/chatbot/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text, history: chatHistory })
            });
            
            document.getElementById(typingId).remove();
            
            const msgId = 'bot-' + Date.now();
            document.getElementById('chatWindow').insertAdjacentHTML('beforeend', 
                <div class="message bot">
                    <div class="message-avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
                            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                        </svg>
                    </div>
                    <div class="bubble" id=""></div>
                </div>
            );
            const bubble = document.getElementById(msgId);
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let botResponse = "";
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split("\n");
                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.replace('data: ', '').trim();
                        if (dataStr === '[DONE]') break;
                        if (dataStr) {
                            try {
                                const dataObj = JSON.parse(dataStr);
                                if (dataObj.token) botResponse += dataObj.token;
                                if (dataObj.error) botResponse = dataObj.error;
                                bubble.innerText = botResponse;
                                scrollToBottom();
                            } catch (e) {}
                        }
                    }
                }
            }
            chatHistory.push({ human: text, ai: botResponse });
        } catch (err) {
            document.getElementById(typingId).remove();
            document.getElementById('chatWindow').insertAdjacentHTML('beforeend', 
                <div class="message bot"><div class="bubble">Connection failed. Please try again.</div></div>
            );
        }
    }
</script>
