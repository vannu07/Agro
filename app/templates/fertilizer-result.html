{% extends 'layout.html' %} {% block body %}

<!-- =========================================================================
     FERTILIZER RESULT — PREMIUM NUTRIENT REPORT
     ========================================================================= -->
<section class="hero-cinematic min-vh-100 position-relative overflow-hidden d-flex align-items-center py-5">
    <!-- Cinematic Background -->
    <div class="hero-cinematic-bg" style="background-image: url('https://images.unsplash.com/photo-1574943320219-553eb213f72d?auto=format&fit=crop&q=80&w=2000'); filter: blur(4px) saturate(0.5);"></div>
    <div class="hero-cinematic-overlay" style="background: linear-gradient(to bottom, rgba(15, 23, 42, 0.5) 0%, rgba(255,255,255,0.98) 100%);"></div>

    <div class="container position-relative z-index-100" style="padding-top: 120px;">
        <div class="row justify-content-center">
            
            <div class="col-lg-9 stagger-load">
                <div class="glass-panel p-5 mb-4" style="border-radius: 32px; background: rgba(255,255,255,0.85); border: 1px solid rgba(234, 179, 8, 0.1); box-shadow: 0 40px 80px rgba(0,0,0,0.08);">
                    
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center mb-4" style="width: 70px; height: 70px; background: rgba(234, 179, 8, 0.1); border-radius: 20px; color: var(--elite-accent);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-flask-round"><path d="M10 2v6.21a4 4 0 0 0 1.25 2.87l4.13 3.92a6 6 0 1 1-6.76 0L12.75 11.08A4 4 0 0 0 14 8.21V2"/><path d="M9 2h6"/><path d="M7 15h10"/></svg>
                        </div>
                        <h4 class="text-muted font-weight-bold text-uppercase small mb-2" style="letter-spacing: 2px;">Intelligence Prescription</h4>
                        <h1 class="fluid-4xl font-weight-bold text-slate-900" style="letter-spacing: -2.5px;">Soil Nutrient <span class="text-gradient-accent">Synthesis</span></h1>
                    </div>

                    <!-- Result Card Content -->
                    <div class="glass-panel p-5 mb-5" style="background: #ffffff; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05);">
                        <div class="row align-items-start">
                            <div class="col-md-1 d-none d-md-block">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 lucide lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            </div>
                            <div class="col-md-11">
                                <div class="fluid-lg" style="line-height: 1.8; color: #334155; font-weight: 500;">
                                    {{ recommendation | safe }}
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Nutrient Matrix -->
                    <div class="row mb-5">
                        <div class="col-md-4">
                            <div class="glass-panel p-4 text-center mb-3" style="background: rgba(15, 23, 42, 0.02); border-radius: 20px;">
                                <h6 class="text-muted small font-weight-bold text-uppercase mb-2" style="letter-spacing: 1px;">Nitrogen (N)</h6>
                                <div class="fluid-xl font-weight-bold" style="color: var(--elite-info);">ANALYZED</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass-panel p-4 text-center mb-3" style="background: rgba(15, 23, 42, 0.02); border-radius: 20px;">
                                <h6 class="text-muted small font-weight-bold text-uppercase mb-2" style="letter-spacing: 1px;">Phosphorus (P)</h6>
                                <div class="fluid-xl font-weight-bold" style="color: var(--elite-accent);">ADJUSTING</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass-panel p-4 text-center mb-3" style="background: rgba(15, 23, 42, 0.02); border-radius: 20px;">
                                <h6 class="text-muted small font-weight-bold text-uppercase mb-2" style="letter-spacing: 1px;">Potassium (K)</h6>
                                <div class="fluid-xl font-weight-bold" style="color: var(--elite-success);">OPTIMAL</div>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="d-flex flex-wrap justify-content-between align-items-center pt-4 border-top">
                        <p class="text-muted mb-3 mb-md-0 small d-flex align-items-center">
                            <span class="pulse-dot mr-2" style="background: #eab308; width: 8px; height: 8px;"></span>
                            Agentic Synthesis v2.4 Active
                        </p>
                        <div class="d-flex gap-3">
                            <a href="{{ url_for('fertilizer_recommendation') }}" class="btn btn-outline-elite px-4 py-2" style="border-radius: 12px; font-weight: 700;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2 lucide lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                New Scan
                            </a>
                            <button class="btn btn-elite px-4 py-2" onclick="window.print()" style="border-radius: 12px; background: #0f172a;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2 lucide lucide-printer"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5"/><rect width="12" height="8" x="6" y="14" rx="1"/></svg>
                                Export Lab Report
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Elite Stagger Entrance -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    gsap.from(".stagger-load > *", {
        y: 40,
        opacity: 0,
        duration: 0.8,
        stagger: 0.15,
        ease: "power4.out"
    });
});
</script>

{% endblock %}
