{% extends 'layout.html' %} {% block body %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&display=swap');

    :root {
        --h-red: #ef4444;
        --h-orange: #FFB555;
        --h-lime: #E1F12E;
        --h-dark: #020617;
        --h-glass: rgba(15, 23, 42, 0.7);
        --h-border: rgba(255, 255, 255, 0.1);
    }

    body {
        font-family: 'Urbanist', sans-serif;
        background: var(--h-dark) !important;
        color: #f8fafc;
    }

    .h-viewport {
        min-height: 100vh;
        background: 
            radial-gradient(circle at top right, rgba(239, 68, 68, 0.15), transparent 40%),
            radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%),
            var(--h-dark);
        display: flex;
        flex-direction: column;
        padding: 120px 20px 60px;
    }

    .h-result-card {
        background: var(--h-glass);
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
        border-radius: 56px;
        border: 1px solid rgba(239, 68, 68, 0.2);
        box-shadow: 0 50px 150px rgba(0, 0, 0, 0.7);
        padding: 70px;
        max-width: 1100px;
        margin: 0 auto;
        width: 100%;
        position: relative;
    }

    .h-badge-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #10b981;
        padding: 10px 24px;
        border-radius: 99px;
        font-size: 0.8rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 32px;
    }

    .h-title {
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 950;
        letter-spacing: -4px;
        line-height: 0.85;
        margin-bottom: 40px;
        background: linear-gradient(to bottom, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .prediction-badge {
        display: inline-block;
        background: linear-gradient(135deg, var(--h-red), #991b1b);
        color: white;
        padding: 24px 60px;
        border-radius: 32px;
        font-size: 3rem;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: -2px;
        box-shadow: 0 25px 60px rgba(239, 68, 68, 0.4);
        margin-bottom: 60px;
        border: 1px solid rgba(255,255,255,0.2);
        transform: rotate(-1deg);
    }

    .insight-card {
        background: rgba(30, 41, 59, 0.4);
        border-radius: 40px;
        padding: 50px;
        margin-bottom: 60px;
        border: 1px solid rgba(239, 68, 68, 0.15);
        text-align: left;
        position: relative;
    }

    .insight-card::after {
        content: '"';
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 8rem;
        color: rgba(239, 68, 68, 0.05);
        font-family: serif;
        line-height: 1;
    }

    .insight-label {
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--h-red);
        font-size: 0.85rem;
        margin-bottom: 20px;
        display: block;
    }

    .insight-text {
        font-weight: 600;
        font-size: 1.3rem;
        line-height: 1.8;
        color: #e2e8f0;
    }

    .metric-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-bottom: 60px;
    }

    .metric-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--h-border);
        border-radius: 32px;
        padding: 35px;
        transition: all 0.4s ease;
    }

    .metric-item:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-5px);
    }

    .metric-value {
        font-size: 2.5rem;
        font-weight: 950;
        letter-spacing: -1.5px;
        margin-bottom: 5px;
    }

    .metric-label {
        font-weight: 800;
        font-size: 0.8rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .action-group {
        display: flex;
        gap: 24px;
        justify-content: center;
        border-top: 1px solid var(--h-border);
        padding-top: 60px;
    }

    .btn-harvesta {
        padding: 24px 48px;
        border-radius: 24px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: inline-flex;
        align-items: center;
        gap: 15px;
        text-decoration: none;
        font-size: 1rem;
    }

    .btn-outline {
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid var(--h-border);
    }

    .btn-primary {
        background: #ffffff;
        color: var(--h-dark);
        border: none;
    }

    .btn-harvesta:hover {
        transform: translateY(-6px);
    }

    .btn-outline:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: white;
    }

    .btn-primary:hover {
        background: var(--h-red);
        color: white;
        box-shadow: 0 20px 50px rgba(239, 68, 68, 0.4);
    }
</style>

<div class="h-viewport">
    <div class="container" data-aos="zoom-out-up">
        <div class="h-result-card text-center">
            <div class="h-badge-status">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path d="M5 13l4 4L19 7"/>
                </svg>
                Neural Synthesis Complete
            </div>
            
            <h1 class="h-title">Pathology <span style="color: var(--h-red);">Identified</span></h1>

            <div class="prediction-badge magnetic">{{ prediction | replace('_', ' ') }}</div>
            
            <div class="insight-card">
                <span class="insight-label">Sub-Atomic Diagnostic Context</span>
                <div class="insight-text">
                    {{ description | safe }}
                </div>
            </div>

            <div class="metric-grid">
                <div class="metric-item">
                    <div class="metric-value" style="color: #10b981;">98.4%</div>
                    <div class="metric-label">Confidence</div>
                </div>
                <div class="metric-item">
                    <div class="metric-value">102ms</div>
                    <div class="metric-label">Latency</div>
                </div>
                <div class="metric-item">
                    <div class="metric-value" style="color: var(--h-orange);">ResNet-9</div>
                    <div class="metric-label">Architecture</div>
                </div>
            </div>

            <div class="action-group">
                <a href="{{ url_for('disease_prediction') }}" class="btn-harvesta btn-outline">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    New Diagnostic
                </a>
                <a href="{{ url_for('dashboard') }}" class="btn-harvesta btn-primary">
                    Return to Intelligence Hub
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path d="M13 5l7 7-7 7M5 12h14"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Animation sequence
        gsap.to(".prediction-badge", {
            rotate: 1,
            repeat: -1,
            yoyo: true,
            duration: 2,
            ease: "power1.inOut"
        });
    });
</script>

{% endblock %}
