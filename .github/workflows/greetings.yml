name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@3c71ce730280171fd1cfb57c00c774f8998586f7 # v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "👋 Thanks for opening your first issue! We appreciate your contribution to the Agro project. Please include as much detail as possible and our team will get back to you soon."
          pr-message: "👋 Thanks for opening your first pull request! We appreciate your contribution to the Agro project. Please make sure your changes follow the project guidelines and our team will review it shortly."
